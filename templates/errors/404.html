{% extends 'base.html' %}

{% block title %}Trang không tồn tại{% endblock %}

{% block content %}
<div class="container py-6">
    <div class="empty-state" style="padding: 6rem 2rem;">
        <div class="empty-state-icon" style="width: 120px; height: 120px; margin-bottom: 2rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16 16s-1.5-2-4-2-4 2-4 2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
        </div>
        <h1 style="font-size: 6rem; font-weight: 800; margin-bottom: 0; background: linear-gradient(to right, var(--color-primary), var(--color-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
        <h2 style="font-size: 1.5rem; margin-bottom: 0.75rem;">Trang không tồn tại</h2>
        <p class="text-muted" style="max-width: 400px; margin: 0 auto 2rem;">
            Xin lỗi, trang bạn đang tìm kiếm không tồn tại hoặc đã được di chuyển.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Về trang chủ
            </a>
        </div>
    </div>
</div>
{% endblock %}
