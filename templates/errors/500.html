{% extends 'base.html' %}

{% block title %}Lỗi hệ thống{% endblock %}

{% block content %}
<div class="container py-6">
    <div class="empty-state" style="padding: 6rem 2rem;">
        <div class="empty-state-icon" style="width: 120px; height: 120px; margin-bottom: 2rem; background: rgba(239, 68, 68, 0.1); color: var(--color-error);">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        </div>
        <h1 style="font-size: 6rem; font-weight: 800; margin-bottom: 0; color: var(--color-error);">500</h1>
        <h2 style="font-size: 1.5rem; margin-bottom: 0.75rem;">Lỗi hệ thống</h2>
        <p class="text-muted" style="max-width: 400px; margin: 0 auto 2rem;">
            Đã xảy ra lỗi không mong muốn. Vui lòng thử lại sau hoặc liên hệ quản trị viên.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Về trang chủ
            </a>
            <button onclick="window.location.reload()" class="btn btn-outline btn-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                Tải lại trang
            </button>
        </div>
    </div>
</div>
{% endblock %}
