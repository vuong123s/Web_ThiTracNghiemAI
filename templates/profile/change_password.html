{% extends 'base.html' %}

{% block title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="container py-6">
    <div class="mb-6">
        <a href="{{ url_for('profile.view') }}" class="text-muted d-flex align-items-center gap-2 mb-3" style="text-decoration: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Quay lại hồ sơ
        </a>
        <h1 style="font-size: 2rem;">Đổi mật khẩu</h1>
    </div>

    <div class="card" style="max-width: 500px;">
        <div class="mb-4 p-3" style="background: rgba(59, 130, 246, 0.1); border-radius: 0.5rem; border-left: 4px solid var(--color-primary);">
            <p class="mb-0" style="color: var(--color-primary);">
                <strong>Lưu ý:</strong> Mật khẩu mới cần có ít nhất 6 ký tự.
            </p>
        </div>

        <form method="POST" action="{{ url_for('profile.change_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
            
            <div class="mb-4">
                <label for="current_password" class="form-label required">Mật khẩu hiện tại</label>
                <input type="password" class="form-control" id="current_password" name="current_password" required>
            </div>

            <div class="mb-4">
                <label for="new_password" class="form-label required">Mật khẩu mới</label>
                <input type="password" class="form-control" id="new_password" name="new_password" 
                       minlength="6" required>
            </div>

            <div class="mb-4">
                <label for="confirm_password" class="form-label required">Xác nhận mật khẩu mới</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                       minlength="6" required>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Đổi mật khẩu
                </button>
                <a href="{{ url_for('profile.view') }}" class="btn btn-outline">Hủy</a>
            </div>
        </form>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    
    if (newPass !== confirmPass) {
        e.preventDefault();
        alert('Mật khẩu xác nhận không khớp!');
    }
});
</script>
{% endblock %}
